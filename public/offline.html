<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06b6d4" />
    <title>BW Barber Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #070b14;
        color: #f8fafc;
      }

      main {
        width: min(90vw, 420px);
        border: 1px solid #1e2a3f;
        border-radius: 28px;
        background: #0f172a;
        padding: 28px;
        box-shadow: 0 24px 80px rgb(0 0 0 / 0.28);
      }

      span {
        display: inline-flex;
        width: 48px;
        height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #ecfeff;
        color: #0891b2;
        font-weight: 900;
      }

      h1 {
        margin: 22px 0 0;
        font-size: 1.55rem;
      }

      p {
        margin: 12px 0 0;
        color: #9aa9bd;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <span>BW</span>
      <h1>Você está offline.</h1>
      <p>Algumas funções precisam de internet. Verifique sua conexão para acessar dados, login e agendamentos.</p>
    </main>
  </body>
</html>
