<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">BW Barber</title>
  <desc id="desc">Logotipo vetorial BW Barber sem fundo.</desc>
  <defs>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#c9ced7"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b6fff"/>
      <stop offset="1" stop-color="#12c6f3"/>
    </linearGradient>
  </defs>

  <g fill="none" fill-rule="evenodd">
    <text
